<!DOCTYPE html>
<html lang="en">
<head>

<body>
  <!-- ✨ NEW: PERSISTENCE BANNER GOES HERE ✨ -->
  <div id="persistence-banner" style="
      position: fixed; 
      top: -100px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: linear-gradient(90deg, #e879f9, #a855f7); 
      color: white; 
      padding: 15px 40px; 
      border-radius: 50px; 
      font-size: 24px; 
      font-weight: 900; 
      z-index: 20000; 
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.6); 
      transition: all 1s ease-in-out; 
      pointer-events: none;
      opacity: 0;">
      10 ROUNDS! YOU'RE A STAR! 🌟
  </div>
  <div id="app-container">
    <div id="chalkboard">
      <header>
        <div class="header-left">
          <h1>SOLVESYNC <span class="version">v1.0</span>&nbsp;Collaborative Problem Solving</h1>
          <div id="status-dot"></div>
          <small id="connection-status">INITIALIZING_CLOUD...</small>
        </div>
        <button id="clear-btn">CLEAR_BOARD</button>
      </header>

      <main id="problem-area">
        <h2 id="math-problem">LOADING_PROBLEM...</h2> 
        <div id="student-work">READY_FOR_INPUT</div>
      </main>

   <footer>
    <div class="input-wrapper">
        <span class="prompt">></span>
        <input type="text" id="answer-input" placeholder="TYPE_SOLUTION_HERE..." autocomplete="off">
      
        <div id="streak-counter">
        STREAK: <span id="streak-num">0</span> | 
        RECORD: <span id="high-score-num">0</span>
        </div>
        <button id="hint-btn" class="cat-btn" style="background: #fbbf24; color: #000;">💡 Show Work</button>
        <button id="next-btn" class="primary-btn">SHUFFLE_NEW</button>
        <button id="submit-btn">SUBMIT_ANSWER</button>
    </div>
        <div class="category-menu">
        <button class="cat-btn" data-type="add">ADDITION</button>
        <button class="cat-btn" data-type="sub">SUBTRACTION</button>
        <button class="cat-btn" data-type="div">DIV</button>
        <button class="cat-btn" data-type="mult">MULTIPLICATION</button>
        <button class="cat-btn" data-type="alg">ALGEBRA</button>
        </div>
</footer>

    </div>
  </div>

<!-- 🤖 CENTERED BRANCHY THE MATH BOT -->
<div id="math-bot" style="
    position: fixed; 
    bottom: -300px; 
    left: 50%; 
    transform: translateX(-50%); 
    font-size: 200px; 
    transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    z-index: 1000; 
    pointer-events: none;
    text-align: center;">
    
    🤖
    
    <!-- Speech Bubble centered above the bot -->
    <div id="bot-bubble" style="

        left: 50%;

        background: #fbbf24; 
        padding: 12px 25px; 
        border-radius: 20px; 
        font-size: 30px; 
        color: #1e293b; 
        font-weight: bold; 
        display: none; 
        white-space: nowrap; 
        border: 4px solid white; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);">

</div>
